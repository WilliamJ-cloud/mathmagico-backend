services:
  - type: web
    name: mathmagico-backend
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: .
    buildCommand: pip install --upgrade pip wheel setuptools && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mathmagico-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

databases:
  - name: mathmagico-db
    plan: free
